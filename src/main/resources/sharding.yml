dataSources:
  shardWallet1:
    jdbcUrl: $${SHARD_WALLET_1_JDBC_URL::}
    username: $${SHARD_WALLET_1_USERNAME::}
    password: $${SHARD_WALLET_1_PASSWORD::}
    driverClassName: com.mysql.cj.jdbc.Driver
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource

  shardWallet2:
    jdbcUrl: $${SHARD_WALLET_2_JDBC_URL::}
    username: $${SHARD_WALLET_2_USERNAME::}
    password: $${SHARD_WALLET_2_PASSWORD::}
    driverClassName: com.mysql.cj.jdbc.Driver
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource

rules:
  - !SHARDING
    defaultDatabaseStrategy:
      standard:
        shardingColumn: id
        shardingAlgorithmName: db-inline

    tables:
      user:
        actualDataNodes: shardWallet${1..2}.user
        databaseStrategy:
          standard:
            shardingColumn: id
            shardingAlgorithmName: db-inline
        keyGenerateStrategy:
          column: id
          keyGeneratorName: snowflakestrategy

      wallet:
        actualDataNodes: shardWallet${1..2}.wallet
        databaseStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: db-inline-user-id
        keyGenerateStrategy:
          column: id
          keyGeneratorName: snowflakestrategy

      transaction:
        actualDataNodes: shardWallet${1..2}.transaction
        databaseStrategy:
          standard:
            shardingColumn: id
            shardingAlgorithmName: db-inline
        keyGenerateStrategy:
          column: id
          keyGeneratorName: snowflakestrategy

      saga_instance:
        actualDataNodes: shardWallet${1..2}.saga_instance
        databaseStrategy:
          standard:
            shardingColumn: id
            shardingAlgorithmName: db-inline
        keyGenerateStrategy:
          column: id
          keyGeneratorName: snowflakestrategy

      saga_step:
        actualDataNodes: shardWallet${1..2}.saga_step
        databaseStrategy:
          standard:
            shardingColumn: id
            shardingAlgorithmName: db-inline
        keyGenerateStrategy:
          column: id
          keyGeneratorName: snowflakestrategy

    shardingAlgorithms:
      db-inline:
        type: INLINE
        props:
          algorithm-expression: shardWallet${id % 2 + 1}

      db-inline-user-id:
        type: INLINE
        props:
          algorithm-expression: shardWallet${user_id % 2 + 1}

    keyGenerators:
      snowflakestrategy:
        type: SNOWFLAKE